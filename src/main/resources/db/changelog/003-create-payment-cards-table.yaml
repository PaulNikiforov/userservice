databaseChangeLog:
  - changeSet:
      id: 003
      author: Pavel Nikiforov
      comments: |
        Create payment_cards table for storing user payment card information.

        Business rules enforced at database level:
        - user_id: BIGINT foreign key references users(id) for relationship
        - number: VARCHAR(16) with unique constraint (basic card number storage)
        - expiration_date: DATE for validity period tracking
        - active: BOOLEAN defaults to true for soft deletion pattern
        - created_at/updated_at: TIMESTAMP for audit trail

        Design decisions:
        - Foreign key constraint ensures referential integrity
        - Unique constraint on card number prevents duplicates
        - VARCHAR(16) for card number (in production, consider encryption)
        - Soft deletion via active flag for audit trail preservation
        - Cascade operations handled at application level (JPA)

        Security considerations:
        - Card numbers stored in plaintext (should be encrypted in production)
        - Consider using tokenization or PCI-compliant storage
        - Last 4 digits only should be displayed in UI
      changes:
        - createTable:
            tableName: payment_cards
            columns:
              - column:
                  name: id
                  type: BIGINT
                  defaultValueSequenceNext: payment_cards_id_seq
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_payment_cards_user
                    references: users(id)
              - column:
                  name: number
                  type: VARCHAR(16)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: holder
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: expiration_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: active
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
